# Web apps deployment (Phase 9.1, tasks 61-62)
# Serves static builds of www, docs, and studio via Caddy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-web-config
  namespace: supatype-platform
data:
  Caddyfile: |
    :8080 {
      # Marketing site (www)
      handle / {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
        header Cache-Control "public, max-age=3600"
        header /assets/* Cache-Control "public, max-age=31536000, immutable"
      }

      handle /pricing* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /blog* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /database* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /auth* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /storage* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /admin-panel* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /realtime* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /about* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /open-source* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /customers* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /changelog* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /contact* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /privacy* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /terms* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /cookies* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      handle /acceptable-use* {
        root * /srv/www
        file_server
        try_files {path} {path}.html {path}/index.html /index.html
        encode gzip
      }

      # Documentation site (docs)
      handle /docs* {
        root * /srv/docs
        file_server
        try_files {path} {path}.html {path}/index.html /docs/index.html
        encode gzip
        header Cache-Control "public, max-age=3600"
        header /docs/_astro/* Cache-Control "public, max-age=31536000, immutable"
      }

      # Studio dashboard (SPA)
      handle /dashboard* {
        root * /srv/studio
        file_server
        try_files {path} /dashboard/index.html
        encode gzip
        header Cache-Control "public, max-age=3600"
        header /dashboard/assets/* Cache-Control "public, max-age=31536000, immutable"
      }

      # Health check
      handle /health {
        respond "OK" 200
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-apps
  namespace: supatype-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-apps
  template:
    metadata:
      labels:
        app: web-apps
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: www-build
              mountPath: /srv/www
            - name: docs-build
              mountPath: /srv/docs
            - name: studio-build
              mountPath: /srv/studio
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: caddy-config
          configMap:
            name: caddy-web-config
        - name: www-build
          emptyDir: {}
        - name: docs-build
          emptyDir: {}
        - name: studio-build
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: web-apps
  namespace: supatype-platform
spec:
  selector:
    app: web-apps
  ports:
    - port: 8080
      targetPort: 8080
