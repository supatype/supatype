name: Deploy Web Apps

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/ui/**"
      - "packages/navigation/**"
      - "packages/common/**"

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter="@supatype/ui" --filter="@supatype/navigation" --filter="@supatype/common"

      - name: Build www
        run: pnpm turbo run build --filter="@supatype/www"

      - name: Build docs
        run: pnpm turbo run build --filter="@supatype/docs"

      # Studio is in packages/studio, not apps/studio for now
      # - name: Build studio
      #   run: pnpm turbo run build --filter="@supatype/studio"

      - name: Upload www artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: www-build
          path: apps/www/dist/

      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: apps/docs/dist/

  deploy:
    name: Deploy to k3s
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: www-build
          path: www-build/

      - uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: docs-build/

      - name: Deploy to cluster
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Create configmap from build artifacts
          kubectl create configmap www-build --from-file=www-build/ \
            -n supatype-platform --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap docs-build --from-file=docs-build/ \
            -n supatype-platform --dry-run=client -o yaml | kubectl apply -f -

          # Restart web-apps deployment to pick up new builds
          kubectl rollout restart deployment/web-apps -n supatype-platform
          kubectl rollout status deployment/web-apps -n supatype-platform --timeout=120s
