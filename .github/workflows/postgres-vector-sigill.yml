# A/B verification: Hub postgres SIGILLs on vector ops; OPTFLAGS="" build does not.
# Does not publish to Docker Hub — builds the fixed image in-job only.
name: Postgres vector SIGILL A/B

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/realtime-readiness]
  workflow_dispatch:

concurrency:
  group: postgres-vector-sigill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vector-sigill-ab:
    name: Hub SIGILL vs OPTFLAGS build
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Checkout postgres OPTFLAGS branch
        uses: actions/checkout@v4
        with:
          repository: supatype/postgres
          ref: fix/pgvector-portable-optflags
          path: postgres-src

      - name: Run A/B vector SIGILL probe
        run: bash tests/integration/scripts/vector-sigill-ab.sh
        env:
          POSTGRES_SRC: ${{ github.workspace }}/postgres-src
          HUB_IMAGE: supatype/postgres:latest
          FIX_IMAGE: supatype/postgres:optflags-test
