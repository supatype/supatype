name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Exercises `supatype dev` (Docker compose) + @supatype/client.
  # Sibling images (postgres/engine/server) come from Docker Hub; realtime +
  # control-plane are built from this monorepo.
  # macOS native is disabled until native Postgres ships contrib extensions (pgcrypto).
  dev-integration:
    name: supatype dev (docker)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      SUPATYPE_PROVIDER: docker
      SUPATYPE_POSTGRES_IMAGE: supatype/postgres:latest
      SUPATYPE_ENGINE_IMAGE: supatype/schema-engine:latest
      SUPATYPE_SERVER_IMAGE: supatype/server:latest
      SUPATYPE_REALTIME_IMAGE: supatype/realtime:ci-dev
      SUPATYPE_CONTROL_PLANE_IMAGE: supatype/control-plane:ci-dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Cache component binaries
        uses: actions/cache@v4
        with:
          path: ~/.supatype/cache
          key: supatype-binaries-v2-ubuntu-22.04-${{ hashFiles('packages/cli/src/binary-cache.ts', 'tests/integration/supatype.config.ts') }}
          restore-keys: supatype-binaries-v2-ubuntu-22.04-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm build

      - name: Prefetch engine/server/postgres/deno binaries
        run: node tests/integration/scripts/ci-prefetch-binaries.mjs

      - name: Run supatype dev integration tests
        run: bash tests/integration/scripts/integration-test.sh --skip-build

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-integration-logs-ubuntu
          path: |
            ~/.supatype/projects/supatype-integration/logs/
            tests/integration/.supatype/
            tests/integration/.env
          retention-days: 3

  # Exercises published Docker images via `supatype self-host compose` (Linux only).
  compose-smoke:
    name: self-host compose (images)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm build

      - name: Build control-plane image for compose smoke
        run: |
          docker build \
            --build-arg ENGINE_IMAGE=supatype/schema-engine:latest \
            -t supatype/control-plane:ci \
            -f packages/self-host-control/Dockerfile \
            packages/self-host-control

      - name: Run compose image smoke test
        run: bash tests/integration/scripts/compose-smoke.sh
        env:
          SUPATYPE_CONTROL_PLANE_IMAGE: supatype/control-plane:ci

      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-logs
          path: tests/integration/.supatype/self-host/
          retention-days: 3
