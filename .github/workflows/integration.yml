name: Integration Tests

on:
  pull_request:
    paths:
      - "packages/cli/**"
      - "packages/client/**"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "packages/client/**"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Exercises `supatype dev` + @supatype/client against pinned CDN binaries.
  dev-integration:
    name: supatype dev (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Cache component binaries
        uses: actions/cache@v4
        with:
          path: ~/.supatype/cache
          key: supatype-binaries-${{ matrix.os }}-${{ hashFiles('tests/integration/supatype.config.ts') }}
          restore-keys: supatype-binaries-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm build

      - name: Prefetch engine/server/postgres/deno binaries
        run: node tests/integration/scripts/ci-prefetch-binaries.mjs

      - name: Run supatype dev integration tests
        run: bash tests/integration/scripts/integration-test.sh --skip-build
        env:
          SUPATYPE_URL: http://localhost:54399
          SUPATYPE_ANON_KEY: integration-anon-key
          # GitHub-hosted macOS has no Docker daemon; use native Postgres there.
          SUPATYPE_DATABASE_PROVIDER: ${{ matrix.os == 'macos-14' && 'native' || '' }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-integration-logs-${{ matrix.os }}
          path: ~/.supatype/projects/supatype-integration/logs/
          retention-days: 3

  # Exercises published Docker images via `supatype self-host compose` (Linux only).
  compose-smoke:
    name: self-host compose (images)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm build

      - name: Run compose image smoke test
        run: bash tests/integration/scripts/compose-smoke.sh

      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-logs
          path: tests/integration/.supatype/self-host/
          retention-days: 3
