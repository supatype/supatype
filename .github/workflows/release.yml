name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Extract version from tag ────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ── Docker Hub `latest`: stable releases always move it; alpha/beta/rc move it until
  #     any vX.Y.Z (non-prerelease) tag exists in the repo, then prereleases stop moving it ──
  docker-latest-policy:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      docker_push_latest: ${{ steps.policy.outputs.docker_push_latest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to update Docker Hub latest tag
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ needs.prepare.outputs.version }}'
          VERSION_LC=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')
          IS_PRE=false
          case "$VERSION_LC" in
            *alpha*|*beta*|*-rc*|*.rc.*|*preview*) IS_PRE=true ;;
          esac

          HAS_STABLE=false
          while IFS= read -r t; do
            [[ -z "${t:-}" ]] && continue
            rest="${t#v}"
            [[ "$rest" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || continue
            HAS_STABLE=true
            break
          done < <(git tag -l 'v[0-9]*')

          if [[ "$IS_PRE" != true ]] || [[ "$HAS_STABLE" != true ]]; then
            echo "docker_push_latest=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub latest=yes (version=${VERSION}, prerelease=${IS_PRE}, stable_tag_in_repo=${HAS_STABLE})"
          else
            echo "docker_push_latest=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub latest=no — prerelease ${VERSION} will not move :latest while a stable vX.Y.Z tag exists"
          fi

  # ── Build, test, and publish npm packages ───────────────────────────────────
  npm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set version in all packages
        run: node scripts/set-version.mjs ${{ needs.prepare.outputs.version }}

      - name: Authenticate with npm registry
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Embed release public key (required)
        run: node scripts/embed-release-pubkey.mjs
        env:
          MINISIGN_PUBLIC_KEY: ${{ secrets.MINISIGN_PUBLIC_KEY }}

      - name: Build
        run: pnpm turbo run build

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Publish npm packages
        shell: bash
        run: |
          set -euo pipefail
          PACKAGES=(
            types
            plugin-sdk
            client
            common
            react
            react-auth
            react-native
            ssr
            ui
            plugin-seo
            plugin-color-picker
            plugin-phone-field
            solid
            svelte
            vue
            cli
          )
          for pkg in "${PACKAGES[@]}"; do
            echo "::group::Publish @supatype/${pkg}"
            pnpm --filter "@supatype/${pkg}" publish --access public --no-git-checks --tag "$NPM_PUBLISH_TAG"
            echo "::endgroup::"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_TAG: ${{ contains(needs.prepare.outputs.version, 'alpha') && 'alpha' || contains(needs.prepare.outputs.version, 'beta') && 'beta' || 'latest' }}

  # ── Build and push Docker images ────────────────────────────────────────────
  docker-storage:
    needs: [prepare, docker-latest-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set version in all packages
        run: node scripts/set-version.mjs ${{ needs.prepare.outputs.version }}

      - name: Install and build storage
        run: pnpm install --frozen-lockfile && pnpm --filter @supatype/storage build

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: supatype/storage
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.docker-latest-policy.outputs.docker_push_latest == 'true' }}

      - uses: docker/build-push-action@v5
        with:
          context: packages/storage
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-realtime:
    needs: [prepare, docker-latest-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: supatype/realtime
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.docker-latest-policy.outputs.docker_push_latest == 'true' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/realtime/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-functions-worker:
    needs: [prepare, docker-latest-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: supatype/functions-worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.docker-latest-policy.outputs.docker_push_latest == 'true' }}

      - uses: docker/build-push-action@v5
        with:
          context: packages/functions-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-studio:
    needs: [prepare, docker-latest-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: supatype/studio
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.docker-latest-policy.outputs.docker_push_latest == 'true' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/studio/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-control-plane:
    needs: [prepare, docker-latest-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build self-host-control
        run: pnpm install --frozen-lockfile && pnpm --filter @supatype/self-host-control build

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: supatype/control-plane
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.docker-latest-policy.outputs.docker_push_latest == 'true' }}

      # schema-engine is a separate repo with independent versioning, so the
      # engine image tag is NOT the monorepo version — always use :latest.
      - uses: docker/build-push-action@v5
        with:
          context: packages/self-host-control
          file: packages/self-host-control/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENGINE_IMAGE=supatype/schema-engine:latest

  # ── GitHub Release ──────────────────────────────────────────────────────────
  github-release:
    needs: [prepare, npm, docker-storage, docker-realtime, docker-functions-worker, docker-studio, docker-control-plane]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'rc') }}
          generate_release_notes: true
