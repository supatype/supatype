name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: RFC v2 migration checks
        run: |
          pnpm --filter @supatype/types build
          pnpm --filter @supatype/types test
          pnpm --filter @supatype/client build
          pnpm --filter @supatype/client test -- tests/types.test.ts
          pnpm --filter @supatype/cli exec vitest run tests/augmentation-generator.test.ts tests/migrate-from-v1.test.ts tests/type-extractor.test.ts

      - name: Runtime contract conformance
        run: pnpm --filter @supatype/cli exec vitest run tests/runtime-contract.test.ts

      - name: Test
        run: pnpm turbo run test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storage package
        run: pnpm --filter @supatype/storage build

      - name: Build docker image — storage
        uses: docker/build-push-action@v5
        with:
          context: packages/storage
          push: false

      - name: Build docker image — realtime
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/realtime/Dockerfile
          push: false

      - name: Build docker image — studio
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/studio/Dockerfile
          push: false
