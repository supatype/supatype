[databases]
# Forward all databases to Postgres (Docker service name: db)
* = host=db port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
# md5 + userlist — same as supatype-cloud; live config is env-generated in the container
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 20
max_db_connections = 60
max_client_conn = 100
# Required for PostgREST compatibility
server_reset_query = DEALLOCATE ALL
ignore_startup_parameters = extra_float_digits,search_path
