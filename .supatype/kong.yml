_format_version: "3.0"

services:
  - name: rest-v1
    url: http://postgrest:3000
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
  - name: auth-v1
    url: http://gotrue:9999
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
  - name: storage-v1
    url: http://host.docker.internal:5000
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
  - name: realtime-v1
    url: http://host.docker.internal:4000
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
        protocols:
          - http
          - https
          - ws
          - wss
  - name: studio
    url: http://host.docker.internal:3002
    routes:
      - name: studio-all
        strip_path: true
        paths:
          - /studio/
