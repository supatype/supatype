services:
  db:
    image: supatype/postgres:17-latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supatype_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-supatype}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supatype_admin}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-set-auth-search-path:
    image: postgres:17-alpine
    restart: "no"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-supatype_admin}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGTARGETDB: ${POSTGRES_DB:-supatype}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for i in $$(seq 1 30); do
          psql -d postgres -v ON_ERROR_STOP=1 -c "SELECT 1" && break || sleep 1
        done
        psql -d postgres -v ON_ERROR_STOP=1 -c "ALTER DATABASE \"$$PGTARGETDB\" SET search_path TO auth, public, extensions;" || psql -d postgres -v ON_ERROR_STOP=1 -c "ALTER DATABASE \"$$PGTARGETDB\" SET search_path TO auth, public;" || true

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    environment:
      # supatype-cloud: infra/k8s/platform/pgbouncer.yaml transaction Deployment
      DATABASES_HOST: db
      DATABASES_PORT: "5432"
      DATABASES_DBNAME: ${POSTGRES_DB:-supatype}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_LISTEN_PORT: "6432"
      PGBOUNCER_MAX_CLIENT_CONN: "2000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_MAX_DB_CONNECTIONS: "200"
      PGBOUNCER_MAX_USER_CONNECTIONS: "100"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "60"
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: "300"
      PGBOUNCER_SERVER_RESET_QUERY: DISCARD ALL
      PGBOUNCER_AUTH_TYPE: md5
      PGBOUNCER_AUTH_FILE: /etc/pgbouncer/userlist.txt
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
      PGBOUNCER_RESERVE_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_TIMEOUT: "3"
    volumes:
      - ./.supatype/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "busybox nc -z -w 2 127.0.0.1 6432"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  gotrue:
    image: supatype/auth:v1.0.0
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:18473}
      GOTRUE_API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:18473}
      GOTRUE_DB_DRIVER: postgres
      # Direct to Postgres (not PgBouncer): GoTrue migrations need session semantics; pq + PgBouncer md5 often disagree on SCRAM vs md5 (Supabase uses db:5432 for auth too).
      GOTRUE_DB_DATABASE_URL: "postgres://${POSTGRES_USER:-supatype_admin}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-supatype}?search_path=auth"
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-change-in-production}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      # Email autoconfirm — set to false and configure SMTP for production
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-supatype}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
    ports:
      - "9999:9999"
    depends_on:
      db:
        condition: service_healthy
      db-set-auth-search-path:
        condition: service_completed_successfully

  postgrest:
    image: postgrest/postgrest:v12.2.8
    environment:
      PGRST_DB_URI: postgresql://authenticator:${POSTGRES_PASSWORD:-postgres}@pgbouncer:6432/${POSTGRES_DB:-supatype}
      PGRST_DB_SCHEMA: "public, supatype"
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-change-in-production}
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
      PGRST_DB_POOL: 3
    ports:
      - "3000:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: supatype
      MINIO_ROOT_PASSWORD: supatype-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: supatype/storage:latest
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-supatype_admin}:${POSTGRES_PASSWORD:-postgres}@pgbouncer:6432/${POSTGRES_DB:-supatype}"
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-change-in-production}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: supatype
      S3_SECRET_KEY: supatype-secret
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "5000:5000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio:
        condition: service_healthy

  realtime:
    image: supatype/realtime:latest
    environment:
      PORT: 4000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-supatype_admin}:${POSTGRES_PASSWORD:-postgres}@pgbouncer:6432/${POSTGRES_DB:-supatype}"
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-change-in-production}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      SECURE_CHANNELS: "true"
      SLOT_NAME: realtime_slot
    ports:
      - "4000:4000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  studio:
    image: supatype/studio:latest
    ports:
      - "3002:3002"

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./.supatype/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "18473:8000"
    depends_on:
      - postgrest
      - gotrue
      - storage
      - realtime
      - studio

  # ─── App service (run: supatype app add) ───
