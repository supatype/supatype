# Integration test config.
# Local binary paths go in supatype.local.config.toml (gitignored) alongside this file.
# Example supatype.local.config.toml:
#
#   [overrides]
#   engine = "/path/to/supatype-schema-engine/target/release/supatype-engine"
#   server = "/path/to/supatype-auth/supatype-server"

[project]
name = "supatype-integration"

[database]
provider = "native"

[server]
mode = "dev"
port = 54399

[app]
mode = "none"

[schema]
path = "schema/index.ts"

[versions]
engine   = "0.4.2"
server   = "0.1.0"
postgres = "17"
deno     = "2.2.0"
